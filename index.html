<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F8FAFC" />
  <meta name="description" content="SmartBlind App - Realtime MQTT Navigation For Blind People" />
  <title>SmartBlind App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loading-overlay" class="loading" aria-live="polite">
    <div class="loading__inner">
      <div class="loading__dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <p class="loading__text">Menghubungkan MQTT...</p>
    </div>
  </div>

  <div class="app">
    <header class="masthead glass">
      <div class="masthead__brand">
        <div class="masthead__logo" aria-hidden="true">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 26 L20 12 L28 26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="20" cy="27" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <div class="masthead__titles">
          <p class="masthead__kicker">Smart Blind System</p>
          <h1 class="masthead__title">Smart Blind App</h1>
          <p class="masthead__subtitle">Realtime MQTT · AI Navigation</p>
        </div>
      </div>
      <div class="masthead__status disconnected" id="connection-badge" title="Status MQTT">
        <span class="masthead__dot"></span>
        <span class="masthead__connection-label">Offline</span>
      </div>
    </header>

    <section class="hero" aria-labelledby="status-heading">
      <h2 id="status-heading" class="sr-only">Status Navigasi</h2>
      <div id="status-card" class="hero__card glass status-card--safe">
        <div class="hero__icon" id="status-icon" aria-hidden="true"></div>
        <p class="hero__label">Status</p>
        <p class="hero__message" id="status-message">Menunggu data...</p>
        <p class="hero__raw" id="status-raw">—</p>
      </div>
    </section>

    <section class="sensors" aria-labelledby="sensor-heading">
      <h2 id="sensor-heading" class="section-title">Panel Sensor</h2>
      <div class="sensors__grid">
        <article class="sensor glass active-safe" id="sensor-kiri">
          <div class="sensor__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
          </div>
          <h3 class="sensor__name">Kiri</h3>
          <p class="sensor__state" id="sensor-kiri-state">Aman</p>
        </article>
        <article class="sensor glass active-safe" id="sensor-tengah">
          <div class="sensor__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </div>
          <h3 class="sensor__name">Depan</h3>
          <p class="sensor__state" id="sensor-tengah-state">Aman</p>
        </article>
        <article class="sensor glass active-safe" id="sensor-kanan">
          <div class="sensor__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
          </div>
          <h3 class="sensor__name">Kanan</h3>
          <p class="sensor__state" id="sensor-kanan-state">Aman</p>
        </article>
      </div>
    </section>

    <section class="audio glass" aria-labelledby="audio-heading">
      <h2 id="audio-heading" class="section-title">Audio Control</h2>
      <div class="audio__actions">
        <button type="button" id="btn-mute" class="btn btn--dark" aria-pressed="false">
          <svg class="btn__icon" id="mute-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M11 5L6 9H3v6h3l5 4V5z"/>
            <path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/>
          </svg>
          <span id="mute-label">Mute Suara</span>
        </button>
        <button type="button" id="btn-test" class="btn btn--outline">Test Suara</button>
      </div>
      <p class="audio__hint">Suara langsung saat status berubah · Tanpa polling</p>
    </section>

    <footer class="footer">
      <p>MQTT · smartblind/status · HiveMQ</p>
    </footer>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
